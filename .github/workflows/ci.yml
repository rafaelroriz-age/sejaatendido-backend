name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        env:
          NODE_ENV: test
          JWT_SEGREDO: test-secret-123456789012345678901234
          DATABASE_URL: postgresql://user:pass@localhost:5432/sejaatendido_test?schema=public
          DIRECT_URL: postgresql://user:pass@localhost:5432/sejaatendido_test
        run: npm test

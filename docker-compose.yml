services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sejaatendido
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - mongodb
    environment:
      NODE_ENV: development
      PORTA: 3001
      DATABASE_URL: postgresql://usuario:senha@db:5432/sejaatendido?schema=public
      MONGODB_URI: mongodb://mongodb:27017/sejaatendido
      CORS_ORIGIN: "*"
      JWT_SEGREDO: "dev-secret-change-in-production"
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  mongo_data:
